<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Enterprise Login | AI Remote Proctoring</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#135bec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Lexend"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Lexend', sans-serif;
        }

        .mesh-bg {
            background-color: #101622;
            background-image:
                radial-gradient(at 0% 0%, rgba(19, 91, 236, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(19, 91, 236, 0.1) 0px, transparent 50%);
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col font-display mesh-bg">
    <!-- Header / Nav -->
    <header class="w-full p-6 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center">
                <span class="material-icons text-white">security</span>
            </div>
            <span class="text-xl font-bold tracking-tight text-slate-800 dark:text-white uppercase">Proctor<span
                    class="text-primary font-extrabold italic">AI</span></span>
        </div>
    </header>
    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center p-4">
        <div class="w-full max-w-md">
            <!-- Login Card -->
            <div
                class="bg-white dark:bg-slate-900/50 backdrop-blur-xl border border-slate-200 dark:border-slate-800 rounded-xl shadow-2xl p-8">
                <!-- Card Header -->
                <div class="text-center mb-8">
                    <div
                        class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-primary/10 border border-primary/20 text-primary text-[10px] font-bold uppercase tracking-widest mb-4">
                        <span class="relative flex h-2 w-2">
                            <span
                                class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-2 w-2 bg-primary"></span>
                        </span>
                        Secure AI-Powered Session
                    </div>
                    <h1 class="text-2xl font-semibold text-slate-900 dark:text-white">Institution Login</h1>
                    <p class="text-slate-500 dark:text-slate-400 mt-2 text-sm">Please sign in to access your dashboard
                    </p>
                </div>
                <!-- Error State Placeholder -->
                <div id="error-message"
                    class="hidden mb-6 p-3 rounded-lg bg-red-500/10 border border-red-500/20 flex items-center gap-3">
                    <span class="material-icons text-red-500 text-sm">error_outline</span>
                    <p class="text-xs text-red-500 font-medium" id="error-text">Invalid institutional email or password.
                    </p>
                </div>
                <!-- Role Selection -->
                <div class="mb-6">
                    <label
                        class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">Access
                        Role</label>
                    <div class="grid grid-cols-3 gap-2 p-1 bg-slate-100 dark:bg-slate-800/50 rounded-lg">
                        <button type="button" onclick="selectRole('student')" id="btn-student"
                            class="py-2 text-xs font-medium rounded-md hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300 transition-colors">Student</button>
                        <button type="button" onclick="selectRole('proctor')" id="btn-proctor"
                            class="py-2 text-xs font-medium rounded-md bg-primary text-white shadow-sm">Proctor</button>
                        <button type="button" onclick="selectRole('admin')" id="btn-admin"
                            class="py-2 text-xs font-medium rounded-md hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300 transition-colors">Admin</button>
                    </div>
                </div>
                <form id="login-form" class="space-y-5" onsubmit="handleLogin(event)">
                    <!-- Email Field -->
                    <div class="space-y-2">
                        <label
                            class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider"
                            for="email">Institutional Email</label>
                        <div class="relative group">
                            <span
                                class="material-icons absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors text-lg">alternate_email</span>
                            <input
                                class="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 focus:border-primary dark:focus:border-primary focus:ring-1 focus:ring-primary rounded-lg text-sm transition-all outline-none"
                                id="email" placeholder="name@university.edu" type="email" required />
                        </div>
                    </div>
                    <!-- Password Field -->
                    <div class="space-y-2">
                        <div class="flex justify-between items-center">
                            <label
                                class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider"
                                for="password">Password</label>
                        </div>
                        <div class="relative group">
                            <span
                                class="material-icons absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors text-lg">lock</span>
                            <input
                                class="w-full pl-10 pr-10 py-3 bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 focus:border-primary dark:focus:border-primary focus:ring-1 focus:ring-primary rounded-lg text-sm transition-all outline-none"
                                id="password" placeholder="••••••••" type="password" required />
                        </div>
                    </div>

                    <!-- Sign In Button -->
                    <button
                        class="w-full bg-primary hover:bg-primary/90 text-white font-semibold py-3 px-4 rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 group"
                        type="submit">
                        Sign In to Dashboard
                        <span
                            class="material-icons text-sm group-hover:translate-x-1 transition-transform">arrow_forward</span>
                    </button>
                </form>
            </div>
        </div>
    </main>
    <!-- Global Footer -->
    <footer class="w-full p-8 mt-auto flex flex-col items-center gap-4">
        <div class="flex items-center gap-2 opacity-60">
            <span class="material-icons text-[12px]">copyright</span>
            <p class="text-[10px] font-medium text-slate-500">2024 ProctorAI Solutions. All rights reserved.</p>
        </div>
    </footer>
    <!-- Backend Integration Scripts -->
    <script src="js/api.js?v=2"></script>
    <script src="js/auth.js?v=2"></script>
</body>

</html>
